# Increase the backlog of connections waiting to be accepted
# (Helps prevents timeouts during traffic spikes)
net.core.netdev_max_backlog = 5000
net.core.somaxconn = 4096

# Increase the queue for half-open (SYN received) connections
net.ipv4.tcp_max_syn_backlog = 8192
# Enable SYN cookies (Keep this ON for protection)
net.ipv4.tcp_syncookies = 1

# Enable TCP BBR Congestion Control
# (Much better at handling the variable speeds of mirror downloads)
net.core.default_qdisc = fq
net.ipv4.tcp_congestion_control = bbr

# Allow the system to reuse time-wait sockets for new connections (helps with Tor Relay)
net.ipv4.tcp_tw_reuse = 1
