---
- name: Ensure hardened sshd configuration block
  ansible.builtin.blockinfile:
    path: /etc/ssh/sshd_config
    block: |
      Port 22
      PermitRootLogin no
      PasswordAuthentication no
      PubkeyAuthentication yes
      X11Forwarding no
    marker: "# {mark} sshd configuration"
    insertafter: EOF
  notify:
    - restart sshd
