---

- name: Create Linux Mint mirror directories
  ansible.builtin.file:
    path: /srv/linux-mint
    state: directory
    owner: mirrors
    group: mirrors
    mode: "0755"
  tags:
    - linux-mint

- name: Copy linux mint timer and service files
  ansible.builtin.copy:
    src: "{{ item.src }}"
    dest: "{{ item.dest }}"
    owner: root
    group: root
    mode: "{{ item.mode }}"
  loop:
    - { src: "distros/LinuxMint/ISO/confd/linuxmint-cd-sync.timer", dest: "/etc/systemd/system/linuxmint-cd-sync.timer", mode: "0644" }
    - { src: "distros/LinuxMint/ISO/confd/linuxmint-cd-sync.service", dest: "/etc/systemd/system/linuxmint-cd-sync.service", mode: "0644" }
    - { src: "distros/LinuxMint/ISO/scripts/linuxmint-cd-sync.sh", dest: "/usr/local/bin/linuxmint-cd-sync.sh", mode: "0755" }
    - { src: "distros/LinuxMint/repository/confd/linuxmint-mirror-sync.timer", dest: "/etc/systemd/system/linuxmint-mirror-sync.timer", mode: "0644" }
    - { src: "distros/LinuxMint/repository/confd/linuxmint-mirror-sync.service", dest: "/etc/systemd/system/linuxmint-mirror-sync.service", mode: "0644" }
    - { src: "distros/LinuxMint/repository/scripts/linuxmint-mirror-sync.sh", dest: "/usr/local/bin/linuxmint-mirror-sync.sh", mode: "0755" }
  tags:
    - linux-mint

- name: Start linux mint timer services
  ansible.builtin.systemd_service:
    name: "{{ item }}"
    enabled: true
    state: started
    daemon_reload: true
  loop:
    - linuxmint-cd-sync.timer
    - linuxmint-mirror-sync.timer
  tags:
    - linux-mint
...